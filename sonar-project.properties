sonar.projectKey=FernandoMrq_teste_valid
sonar.organization=fernandomrq

sonar.sources=src,frontend/valid-os-web/src
sonar.tests=tests,frontend/valid-os-web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*Tests/**/*.cs

sonar.exclusions=**/bin/**,**/obj/**,**/dist/**,**/node_modules/**,frontend/valid-os-web/public/**,**/Migrations/**

# Cobertura: composition root, DI declarativo, EF design-time, bootstrap e rotas declarativas (sem lógica de negócio).
sonar.coverage.exclusions=**/Program.cs,**/Program.Partial.cs,**/DependencyInjection.cs,**/*DbContextFactory.cs,frontend/valid-os-web/src/main.tsx,frontend/valid-os-web/src/vite-env.d.ts,frontend/valid-os-web/src/**/*.d.ts,frontend/valid-os-web/src/app/router/**

sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.javascript.lcov.reportPaths=frontend/valid-os-web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/valid-os-web/coverage/lcov.info

sonar.sourceEncoding=UTF-8
