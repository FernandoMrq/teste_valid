sonar.projectKey=FernandoMrq_teste_valid
sonar.organization=fernandomrq

sonar.sources=src,frontend/valid-os-web/src
sonar.tests=tests,frontend/valid-os-web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*Tests/**/*.cs

sonar.exclusions=**/bin/**,**/obj/**,**/dist/**,**/node_modules/**,frontend/valid-os-web/public/**,**/Migrations/**,**/logs/**,**/appsettings*.json,**/Dockerfile

# Cobertura: composition root, DI declarativo, EF design-time, bootstrap, rotas declarativas,
# DTOs/records de contrato, configurações EF, POCOs de Mongo/Options, UI primitives e barrels.
sonar.coverage.exclusions=\
  **/Program.cs,\
  **/Program.Partial.cs,\
  **/DependencyInjection.cs,\
  **/*DbContextFactory.cs,\
  **/Valid.OS.Contracts/**,\
  **/DTOs/**,\
  src/Valid.OS.API/Models/**,\
  src/Valid.OS.Infrastructure/Persistence/Configurations/**,\
  src/Valid.OS.Infrastructure/Mongo/MongoContext.cs,\
  src/Valid.OS.Infrastructure/Mongo/NotificationDocument.cs,\
  src/Valid.OS.Infrastructure/Options/**,\
  src/Valid.OS.Domain/Events/**,\
  src/Valid.OS.Domain/Enums/**,\
  frontend/valid-os-web/src/main.tsx,\
  frontend/valid-os-web/src/vite-env.d.ts,\
  frontend/valid-os-web/src/**/*.d.ts,\
  frontend/valid-os-web/src/app/**,\
  frontend/valid-os-web/src/pages/**,\
  frontend/valid-os-web/src/App.tsx,\
  frontend/valid-os-web/src/env.ts,\
  frontend/valid-os-web/src/features/auth/lib/keycloak.ts,\
  frontend/valid-os-web/src/shared/ui/Badge/**,\
  frontend/valid-os-web/src/shared/ui/Card/**,\
  frontend/valid-os-web/src/shared/ui/Dialog/**,\
  frontend/valid-os-web/src/shared/ui/Dropdown/**,\
  frontend/valid-os-web/src/shared/ui/Input/**,\
  frontend/valid-os-web/src/shared/ui/TextArea/**,\
  frontend/valid-os-web/src/shared/ui/Tooltip/**,\
  frontend/valid-os-web/src/shared/ui/Skeleton/**,\
  frontend/valid-os-web/src/shared/ui/EmptyState/**,\
  frontend/valid-os-web/src/shared/ui/Select/**,\
  frontend/valid-os-web/src/**/index.ts,\
  frontend/valid-os-web/src/**/types.ts,\
  frontend/valid-os-web/src/**/*-variants.ts

sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.javascript.lcov.reportPaths=frontend/valid-os-web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/valid-os-web/coverage/lcov.info

sonar.sourceEncoding=UTF-8
