services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: valid
      POSTGRES_PASSWORD: valid
      POSTGRES_DB: valid_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valid -d valid_os"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: src/Valid.OS.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=valid_os;Username=valid;Password=valid"
      Mongo__ConnectionString: "mongodb://mongo:27017"
      Mongo__DatabaseName: "valid_os"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__VHost: "/"
      RabbitMq__User: "guest"
      RabbitMq__Password: "guest"
      Keycloak__Authority: "http://keycloak:8080/realms/valid-os"
      Keycloak__Audience: "valid-os-api"
      Keycloak__ValidIssuer: "http://localhost:8080/realms/valid-os"
    ports:
      - "5000:8080"
    volumes:
      - api_dataprotection_keys:/app/dataprotection-keys
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/Valid.OS.Worker/Dockerfile
    environment:
      Mongo__ConnectionString: "mongodb://mongo:27017"
      Mongo__DatabaseName: "valid_os"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__VHost: "/"
      RabbitMq__User: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy

  web:
    build:
      context: ./frontend/valid-os-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5000"
        VITE_KEYCLOAK_URL: "http://localhost:8080"
        VITE_KEYCLOAK_REALM: "valid-os"
        VITE_KEYCLOAK_CLIENT: "valid-os-web"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_healthy

volumes:
  pgdata:
  mongodata:
  api_dataprotection_keys:
